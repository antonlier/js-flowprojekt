<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hjem</title>
    <link rel="stylesheet" href="/css/roaststyle.css" />
    <link rel="stylesheet" href="/css/pop-products-style.css" />
    <link rel="stylesheet" href="/css/opening-hours.css" />
    <script async src="hero.js"></script>
    <script async src="products.js"></script>
    <script async src="script.js"></script>
    <script async src="kvittering.js"></script>
    <script async src="openinghours.js"></script>
  </head>
  <body>
    <header id="topNav">
      <a href="#" class="kurv"><img src="/img/cart.svg" alt="kurv" /></a>
      <a href="index.html"
        ><img id="logo" class="logo" src="/img/logo.svg" alt="logo"
      /></a>
      <a href="#"><img src="/img/menu.svg" alt="menu" /></a>
    </header>
    <main>
      <section class="hero"></section>
      <section class="popProdukt">
        <h2>Populære produkter</h2>
        <div class="products"></div>
      </section>
      <section class="opening-hours"></section>
    </main>
    <footer>
      <div id="footer-container">
        <div class="boks logo">
          <a href="index.html"
            ><img class="logo" src="/img/logo.svg" alt="Logo"
          /></a>
        </div>
      
    </footer>
    <!--Kurv overlay-->
    <div class="cart-overlay">
      <div class="cart">
        <h2>Kurv</h2>
        <div class="cart-items"></div>
        <button class="close-cart">Luk</button>
        <button class="place-order">Bestil</button>
        <!-- klasse til print af kvittering gennem JS -->
        <div class="receipt"></div>
      </div>
    </div>
  </body>
</html>
